<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>笔顺练习 · 五年级语文第十一章节（共15词）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background: linear-gradient(145deg, #5c1a9e 0%, #a0259e 50%, #d1306b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 12px 30px;
    }
    .header { width:100%; max-width:520px; color:white; margin-bottom:14px; }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .header-title { font-size:17px; font-weight:bold; letter-spacing:1px; }
    .word-counter { font-size:13px; background:rgba(255,255,255,0.25); padding:3px 10px; border-radius:20px; }
    .progress-track { background:rgba(255,255,255,0.25); border-radius:10px; height:8px; overflow:hidden; }
    .progress-fill { background:#FDCB6E; height:100%; border-radius:10px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }
    .card { background:#fff; border-radius:24px; padding:22px 20px 24px; width:100%; max-width:520px; box-shadow:0 12px 40px rgba(0,0,0,0.25); min-height:440px; }
    .word-banner { text-align:center; margin-bottom:14px; }
    .word-chinese { font-size:44px; font-weight:900; color:#3B0086; line-height:1.1; }
    .word-pinyin { font-size:16px; color:#7C4DFF; margin-top:4px; letter-spacing:1px; }
    .char-dots { display:flex; justify-content:center; gap:10px; margin:12px 0; }
    .char-dot { width:36px; height:36px; border-radius:50%; background:#EDE7FF; font-size:17px; display:flex; align-items:center; justify-content:center; color:#9E9E9E; font-weight:bold; transition:all 0.3s; }
    .char-dot.current { background:#7C4DFF; color:white; transform:scale(1.15); box-shadow:0 3px 10px rgba(124,77,255,0.4); }
    .char-dot.done { background:#00B894; color:white; }
    .phase-label { text-align:center; font-size:14px; font-weight:bold; margin-bottom:10px; min-height:22px; }
    .phase-label.demo { color:#5c1a9e; }
    .phase-label.quiz { color:#E91E8C; }
    .writer-wrap { display:flex; justify-content:center; margin:6px 0 10px; }
    .writer-box {
      position:relative; width:260px; height:260px;
      border-radius:16px; overflow:hidden;
      border:2.5px solid #b8a8ff;
      background:#FAFAFA;
    }
    /* 田字格 grid */
    .writer-box::before {
      content:""; position:absolute; inset:0;
      background-image:
        linear-gradient(to right, transparent 49.5%, #b8a8ff 49.5%, #b8a8ff 50.5%, transparent 50.5%),
        linear-gradient(to bottom, transparent 49.5%, #b8a8ff 49.5%, #b8a8ff 50.5%, transparent 50.5%);
      pointer-events:none; z-index:1;
    }
    .writer-box::after {
      content:""; position:absolute; inset:0;
      background-image:
        repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(180,160,255,0.2) 8px,rgba(180,160,255,0.2) 9px),
        repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(180,160,255,0.2) 8px,rgba(180,160,255,0.2) 9px);
      pointer-events:none; z-index:0;
    }
    #hanzi-target { position:absolute; inset:0; z-index:2; }

    .feedback { text-align:center; font-size:16px; min-height:28px; margin:6px 0; font-weight:bold; }
    .hint-tip { text-align:center; font-size:12px; color:#9E9E9E; margin-top:2px; min-height:18px; }

    .btns { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
    button { padding:11px 22px; border:none; border-radius:50px; font-size:15px; font-family:inherit; font-weight:bold; cursor:pointer; transition:transform 0.12s,opacity 0.2s; user-select:none; -webkit-user-select:none; }
    button:active { transform:scale(0.94); }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-main { background:linear-gradient(135deg,#7C4DFF,#D81B60); color:white; box-shadow:0 4px 14px rgba(124,77,255,0.45); }
    .btn-ghost { background:#F0ECFF; color:#7C4DFF; }
    .info-box { border-radius:14px; padding:13px 16px; font-size:15px; color:#2D3436; margin:10px 0; line-height:1.8; }
    .info-box .lbl { font-weight:bold; display:inline-block; margin-bottom:3px; font-size:14px; }
    .intro-chips { display:flex; justify-content:center; gap:8px; margin:8px 0; flex-wrap:wrap; }
    .chip { background:#EDE7FF; color:#4A1A8E; padding:5px 14px; border-radius:20px; font-size:22px; font-weight:bold; }
    .celebrate { text-align:center; padding:10px 0; }
    .big-emoji { font-size:64px; line-height:1; margin-bottom:10px; animation:pop .5s ease; }
    @keyframes pop { 0%{transform:scale(0)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
    .celebrate h2 { font-size:26px; color:#3B0086; margin-bottom:6px; }
    .celebrate p { color:#636E72; font-size:14px; margin-bottom:16px; line-height:1.6; }
    .all-done { text-align:center; }
    .stars { font-size:48px; letter-spacing:6px; margin-bottom:12px; }
    .word-chips { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:20px; }
    .word-chip { background:#F5F0FF; color:#7C4DFF; padding:5px 12px; border-radius:20px; font-size:15px; }
  
    /* TOC grid */
    .toc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin:8px 0 4px; }
    .toc-item { background:#F5F0FF; border-radius:14px; padding:12px 6px 10px; text-align:center;
      cursor:pointer; transition:transform 0.12s,background 0.2s; border:2px solid transparent;
      -webkit-tap-highlight-color:transparent; user-select:none; }
    .toc-item:hover,
    .toc-item:active { background:#EDE7FF; transform:scale(1.04); border-color:#7C4DFF; }
    .toc-word  { font-size:20px; font-weight:900; color:#3B0086; line-height:1.2; }
    .toc-pinyin{ font-size:10px; color:#9E9E9E; margin-top:3px; letter-spacing:0.5px; }
    .toc-header{ text-align:center; margin-bottom:12px; }
    .toc-title { font-size:18px; font-weight:bold; color:#3B0086; }
    .toc-sub   { font-size:12px; color:#9E9E9E; margin-top:3px; }
    .mode-btns { display:flex; gap:10px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
    .btn-green { background:#E8F5E9; color:#2E7D32; }
    .nav-bar   { display:flex; gap:8px; justify-content:center; margin-bottom:6px; flex-wrap:wrap; }

  </style>

// ── State ──────────────────────────────────────────────
let wi=0, ci=0, writer=null, mistakes=0, watchMode=false;
const card   = document.getElementById("card");
const pgfill = document.getElementById("pgfill");
const wnumEl = document.getElementById("wnum");

function updateHeader() {
  wnumEl.textContent = Math.min(wi+1, 15);
  pgfill.style.width = (wi/15*100) + "%";
}

// ── Audio ──────────────────────────────────────────────
let _audioObj = null;
function playAudio(word) {
  if (!AUDIO_DATA[word]) return;
  try { if (_audioObj) { _audioObj.pause(); _audioObj.currentTime = 0; } } catch(e){}
  _audioObj = new Audio(AUDIO_DATA[word]);
  _audioObj.play().catch(()=>{});
}

function clearWriter() {
  if (writer) { const t=document.getElementById("hanzi-target"); if(t) t.innerHTML=""; writer=null; }
}
function dotsHTML(it, cur) {
  return it.chars.map((c,i)=>`<div class="char-dot ${i<cur?"done":i===cur?"current":""}">${c}</div>`).join("");
}
function flash(id, msg, color) {
  const el=document.getElementById(id); if(!el) return;
  el.textContent=msg; el.style.color=color||"#333";
}
function esc(w){ return w.replace(/'/g,"\\'"); }

// ── TOC ────────────────────────────────────────────────
function showTOC() {
  clearWriter();
  pgfill.style.width="0%"; wnumEl.textContent="—";
  card.innerHTML=`
    <div class="toc-header">
      <div class="toc-title">📚 第十一章节生词</div>
      <div class="toc-sub">点击任意生词开始学习</div>
    </div>
    <div class="toc-grid">
      ${vocab.map((v,i)=>`
        <div class="toc-item" onclick="goToWord(${i})">
          <div class="toc-word">${v.word}</div>
          <div class="toc-pinyin">${v.pinyin}</div>
        </div>`).join("")}
    </div>`;
}
function goToWord(idx){ wi=idx; ci=0; updateHeader(); showIntro(); }

// ── Intro ──────────────────────────────────────────────
function showIntro() {
  ci=0; clearWriter();
  const it=vocab[wi]; updateHeader();
  const w=esc(it.word);
  card.innerHTML=`
    <div class="word-banner">
      <div class="word-chinese">${it.word}</div>
      <div class="word-pinyin">${it.pinyin}</div>
    </div>
    <div class="intro-chips">${it.chars.map(c=>`<span class="chip">${c}</span>`).join("")}</div>
    <div class="info-box" style="background:#F5F0FF">
      <div class="lbl" style="color:#7C4DFF">📖 解释</div><br>${it.explanation}
    </div>
    <div class="nav-bar" style="margin-top:10px">
      <button class="btn-ghost" onclick="playAudio('${w}')">🔊 听读音</button>
      <button class="btn-ghost" onclick="showTOC()">📋 目录</button>
    </div>
    <div style="text-align:center;font-size:13px;color:#9E9E9E;margin:8px 0 2px">选择练习方式：</div>
    <div class="mode-btns">
      <button class="btn-ghost btn-green" onclick="startWatch()">👀 只看笔顺</button>
      <button class="btn-main" onclick="startQuizMode()">✏️ 练习书写</button>
    </div>`;
}

// ── Demo core ─────────────────────────────────────────
function startWatch()    { watchMode=true;  beginDemoCore(); }
function startQuizMode() { watchMode=false; beginDemoCore(); }

function beginDemoCore() {
  clearWriter();
  const it=vocab[wi]; const ch=it.chars[ci];
  const w=esc(it.word);
  card.innerHTML=`
    <div class="word-banner">
      <div class="word-chinese">${it.word}</div>
      <div class="word-pinyin">${it.pinyin}</div>
    </div>
    <div class="char-dots">${dotsHTML(it,ci)}</div>
    <div class="phase-label demo" id="plbl">⏳ 正在准备「${ch}」…</div>
    <div class="writer-wrap"><div class="writer-box"><div id="hanzi-target"></div></div></div>
    <div class="feedback" id="fb"></div>
    <div class="hint-tip" id="htip"></div>
    <div class="btns" id="btns">
      <button class="btn-ghost" onclick="playAudio('${w}')">🔊 听读音</button>
      <button class="btn-ghost" onclick="replayAnim()" id="btn-replay">🔄 再看一遍</button>
      ${watchMode?"":`<button class="btn-main" onclick="beginQuiz()" id="btn-write" disabled>✏️ 我来写！</button>`}
    </div>`;

  writer = HanziWriter.create("hanzi-target", ch, {
    width:256, height:256, padding:14,
    showOutline:true, showCharacter:false,
    strokeColor:"#4A1A8E", outlineColor:"#9B89FF", drawingColor:"#E91E8C",
    strokeAnimationSpeed:0.75, delayBetweenStrokes:320,
    charDataLoader: function(c,onLoad,onError){
      if(CHAR_DATA[c]){ setTimeout(()=>onLoad(CHAR_DATA[c]),0); } else onError("not found");
    },
    onLoadCharDataSuccess: function(){ playAnim(); },
    onLoadCharDataError: function(){
      const l=document.getElementById("plbl"); if(l) l.textContent="⚠️ 暂无此字笔顺资料，跳过";
      setTimeout(nextChar,1500);
    }
  });
}

function playAnim() {
  const ch=vocab[wi].chars[ci];
  const w=esc(vocab[wi].word);
  const l=document.getElementById("plbl");
  if(l){ l.className="phase-label demo"; l.textContent=`👀 正在示范「${ch}」的笔顺，请仔细观察…`; }
  const bw=document.getElementById("btn-write"); if(bw) bw.disabled=true;
  if(!writer) return;
  writer.animateCharacter({
    onComplete: function() {
      const l2=document.getElementById("plbl");
      if(watchMode){
        if(l2) l2.textContent=`✅ 示范完毕！`;
        const btns=document.getElementById("btns");
        if(btns) btns.innerHTML=`
          <button class="btn-ghost" onclick="playAudio('${w}')">🔊 听读音</button>
          <button class="btn-ghost" onclick="replayAnim()">🔄 再看一遍</button>
          <button class="btn-main" onclick="nextChar()">→ 继续</button>`;
      } else {
        if(l2) l2.textContent=`✅ 示范完毕！点「我来写！」开始练习`;
        const bw2=document.getElementById("btn-write"); if(bw2) bw2.disabled=false;
      }
    }
  });
}
function replayAnim() {
  const bw=document.getElementById("btn-write"); if(bw) bw.disabled=true;
  if(writer){ writer.cancelQuiz(); writer.hideCharacter(); }
  playAnim();
}

// ── Quiz ──────────────────────────────────────────────
function beginQuiz() {
  mistakes=0;
  const ch=vocab[wi].chars[ci];
  const l=document.getElementById("plbl");
  if(l){ l.className="phase-label quiz"; l.textContent=`✏️ 请按笔顺写出「${ch}」`; }
  document.getElementById("btns").innerHTML=`<button class="btn-ghost" onclick="backToDemo()">👀 再看示范</button>`;
  flash("fb","","");
  document.getElementById("htip").textContent="写错 2 次会自动出现笔画动画提示";
  if(!writer) return;
  writer.quiz({
    showOutline:true, showHintAfterMisses:2, highlightColor:"#FF6B35",
    onMistake: function(){
      mistakes++;
      flash("fb","❌ 笔划方向不对，再试一次！","#E17055");
      if(mistakes===2){ const tip=document.getElementById("htip"); if(tip) tip.textContent="💡 提示笔画动画即将出现…"; }
    },
    onCorrectStroke: function(d){
      flash("fb",d.strokesRemaining>0?"✅ 对！继续写下一笔…":"","#00B894");
      document.getElementById("htip").textContent="";
    },
    onComplete: function(){
      const msg=mistakes===0?"🌟 完美！一次就写对了！":`👏 写完啦！（错了 ${mistakes} 笔，继续加油）`;
      flash("fb",msg,"#7C4DFF");
      document.getElementById("htip").textContent="";
      setTimeout(nextChar,1400);
    }
  });
}
function backToDemo(){ watchMode=false; if(writer) writer.cancelQuiz(); beginDemoCore(); }

// ── Navigate ──────────────────────────────────────────
function nextChar() {
  ci++;
  if(ci>=vocab[wi].chars.length){ ci=0; showWordDone(); }
  else { clearWriter(); beginDemoCore(); }
}

// ── Word done ─────────────────────────────────────────
function showWordDone() {
  clearWriter();
  const it=vocab[wi];
  const w=esc(it.word);
  setTimeout(()=>playAudio(it.word),500);
  const isLast=wi===vocab.length-1;
  const emojis=["🎉","🥳","🌟","🎊","✨","🏆","💫","🎈","🌈","⭐","🎯","🦋","🌸","🎀","🐬"];
  card.innerHTML=`
    <div class="celebrate">
      <div class="big-emoji">${emojis[wi%emojis.length]}</div>
      <h2>太棒了！</h2>
      <p>「${it.word}」${watchMode?"笔顺已看完！":"的笔顺已掌握！"}</p>
      <div class="info-box" style="background:#F0FFF9">
        <b style="color:#00B894">📖 复习</b><br><br>
        <b>${it.word}</b>（${it.pinyin}）<br>${it.explanation}
      </div>
      <div class="btns" style="flex-wrap:wrap">
        <button class="btn-ghost" onclick="playAudio('${w}')">🔊 听读音</button>
        <button class="btn-ghost" onclick="replayWord()">🔄 再练一次</button>
        <button class="btn-ghost" onclick="showTOC()">📋 目录</button>
        <button class="btn-main" onclick="${isLast?"showAllDone()":"nextWord()"}">${isLast?"查看总结 🏆":"下一个生词 →"}</button>
      </div>
    </div>`;
  updateHeader();
}
function replayWord(){ ci=0; showIntro(); }
function nextWord()  { wi++; ci=0; updateHeader(); showIntro(); }

// ── All done ──────────────────────────────────────────
function showAllDone() {
  clearWriter();
  pgfill.style.width="100%"; wnumEl.textContent="15";
  card.innerHTML=`
    <div class="all-done">
      <div class="stars">⭐⭐⭐</div>
      <h2 style="font-size:28px;color:#3B0086;margin-bottom:8px">全部完成！</h2>
      <p style="color:#636E72;font-size:14px;margin-bottom:16px">你已经练习了全部 15 个生词的笔顺，<br>非常厉害，继续保持！</p>
      <div class="word-chips">${vocab.map(v=>`<span class="word-chip">${v.word}</span>`).join("")}</div>
      <div class="btns">
        <button class="btn-ghost" onclick="showTOC()">📋 返回目录</button>
        <button class="btn-main" onclick="restart()">🔄 重新开始</button>
      </div>
    </div>`;
}

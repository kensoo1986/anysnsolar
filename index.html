<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');

  :root {
    --sun: #FFB800;
    --sun-deep: #FF8C00;
    --sky: #4FC3F7;
    --sky-deep: #0288D1;
    --green: #66BB6A;
    --green-deep: #388E3C;
    --bg: #FFF8E7;
    --card: #FFFDF5;
    --text: #2C1A0E;
    --shadow: rgba(44,26,14,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--sun) 0%, var(--sun-deep) 100%);
    padding: 16px 80px 12px 24px;
    text-align: center;
    position: relative;
    box-shadow: 0 4px 16px rgba(255,140,0,0.35);
  }
  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: #fff;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.18);
  }
  header p { color: rgba(255,255,255,0.92); font-size: 0.9rem; margin-top: 2px; }

  .sun-spin {
    position: absolute; top: 10px; right: 16px;
    width: 54px; height: 54px;
    animation: spin-slow 10s linear infinite;
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }

  /* SCORE BAR */
  .scorebar {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    background: var(--green-deep); color: #fff;
    padding: 7px 20px; font-weight: 700; font-size: 1rem; flex-wrap: wrap;
  }
  .scorebar span { background: rgba(255,255,255,0.18); border-radius: 20px; padding: 3px 14px; }
  #score-num { font-size: 1.25rem; color: var(--sun); }

  /* SCENE WRAPPER */
  .scene-wrapper {
    padding: 14px 12px 6px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .scene-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.25rem; color: var(--sun-deep);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .instruction {
    background: #E3F2FD; border-left: 4px solid var(--sky-deep);
    border-radius: 8px; padding: 7px 14px;
    font-size: 0.9rem; margin-bottom: 12px; color: #01579B;
  }

  /* SCENE CONTAINER */
  .scene-container {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 32px var(--shadow);
    cursor: crosshair;
    border: 3px solid var(--sun);
    user-select: none;
    background: #87CEEB;
  }
  .scene-container svg { display: block; width: 100%; height: auto; }

  /* HOTSPOTS */
  .hotspot {
    position: absolute; border-radius: 50%;
    
    
    cursor: pointer; transition: all .25s;
    
  }
  .hotspot:hover {
    background: rgba(255,184,0,0.28);
    border-color: var(--sun-deep);
    transform: scale(1.12);
  }
  .hotspot.found {
    border: 3px solid var(--green);
    background: rgba(102,187,106,0.28);
    animation: pop-found .4s ease forwards;
    pointer-events: none;
  }
  .hotspot.found::after {
    content: '✓';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 1.5rem; color: var(--green-deep); font-weight: 900;
  }
    50%      { box-shadow: 0 0 0 12px rgba(255,184,0,0); }
  }
  @keyframes pop-found {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  /* POPUP */
  #popup-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.48); z-index: 100;
    align-items: center; justify-content: center;
  }
  #popup-overlay.show { display: flex; }
  .popup-card {
    background: var(--card); border-radius: 22px;
    padding: 28px 30px 22px; max-width: 400px; width: 93%;
    box-shadow: 0 12px 48px rgba(0,0,0,0.28);
    text-align: center;
    animation: card-in .32s cubic-bezier(.34,1.56,.64,1);
    border-top: 6px solid var(--sun);
  }
  @keyframes card-in {
    from { transform: scale(0.7) translateY(30px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .popup-emoji { font-size: 3.4rem; margin-bottom: 4px; display: block; }
  .popup-card .popup-label { font-size: 0.75rem; color: #aaa; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .popup-card h2 { font-family: 'Baloo 2', cursive; font-size: 1.45rem; color: var(--sun-deep); margin-top: 2px; }
  .popup-card p { font-size: 0.96rem; color: #555; margin-top: 10px; line-height: 1.6; }
  .popup-fact {
    margin-top: 14px; padding: 10px 14px;
    background: #FFF8E1; border-radius: 10px;
    font-size: 0.87rem; color: #7B5E00;
    border-left: 4px solid var(--sun); text-align: left;
  }
  .popup-fact strong { color: var(--sun-deep); }
  .popup-close {
    margin-top: 18px;
    background: var(--sun); color: #fff; border: none;
    border-radius: 30px; padding: 10px 36px;
    font-family: 'Baloo 2', cursive; font-size: 1.05rem;
    cursor: pointer; box-shadow: 0 4px 12px rgba(255,140,0,0.3);
    transition: transform .15s;
  }
  .popup-close:hover { transform: scale(1.06); }

  /* FOUND PANEL */
  .found-panel { max-width: 1100px; margin: 12px auto 80px; padding: 0 12px; }
  .found-panel h3 { font-family: 'Baloo 2', cursive; font-size: 1.05rem; color: var(--green-deep); margin-bottom: 8px; }
  .found-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .found-chip {
    background: #E8F5E9; border: 2px solid var(--green);
    border-radius: 20px; padding: 5px 14px;
    font-size: 0.85rem; font-weight: 700; color: var(--green-deep);
    opacity: 0.32; transition: opacity .35s;
    display: flex; align-items: center; gap: 5px;
  }
  .found-chip.active { opacity: 1; }

  /* WIN */
  #win-screen {
    display: none; position: fixed; inset: 0;
    background: linear-gradient(135deg,#FFF8E7,#FFF3CD);
    z-index: 200; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 30px;
  }
  #win-screen.show { display: flex; }
  .win-emoji { font-size: 5rem; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)} }
  #win-screen h2 { font-family:'Baloo 2',cursive; font-size:2rem; color:var(--sun-deep); margin:12px 0 6px; }
  #win-screen p { font-size:1rem; color:#666; max-width:340px; line-height:1.6; }
  .replay-btn {
    margin-top: 22px;
    background: var(--sun-deep); color: #fff; border: none;
    border-radius: 30px; padding: 13px 44px;
    font-family: 'Baloo 2', cursive; font-size: 1.1rem;
    cursor: pointer; box-shadow: 0 6px 18px rgba(255,140,0,.3);
    transition: transform .15s;
  }
  .replay-btn:hover { transform: scale(1.06); }

  /* CREDIT */
  .credit-badge {
    position: fixed; bottom: 14px; right: 16px;
    background: rgba(255,184,0,0.93);
    color: #7B4500; font-family: 'Baloo 2', cursive;
    font-size: 0.78rem; font-weight: 700;
    padding: 5px 13px 5px 10px; border-radius: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    display: flex; align-items: center; gap: 5px;
    z-index: 9999; border: 1.5px solid rgba(255,255,255,0.6);
    user-select: none;
  }
  .credit-badge .dot { width:7px;height:7px;background:#FF6F00;border-radius:50%; }
</style>

  <div class="found-list" id="found-list"><div class="found-chip" data-id="panel">🏠 屋顶太阳能电池板</div><div class="found-chip" data-id="street">💡 太阳能路灯</div><div class="found-chip" data-id="bus">🚌 太阳能公交候车亭</div><div class="found-chip" data-id="car">🚗 太阳能停车棚 + EV 充电</div><div class="found-chip" data-id="sign">📺 太阳能 LED 广告牌</div></div>
</div>

<!-- POPUP -->
<div id="popup-overlay">
  <div class="popup-card">
    <span class="popup-emoji" id="popup-emoji">☀️</span>
    <div class="popup-label">太阳能装置发现！</div>
    <h2 id="popup-title"></h2>
    <p id="popup-desc"></p>
    <div class="popup-fact" id="popup-fact"></div>
    <button class="popup-close" onclick="closePopup()">明白了！继续找 →</button>
  </div>
</div>

<!-- CREDIT BADGE -->
<div class="credit-badge"><span class="dot"></span> Anysn 制作</div>

<!-- WIN SCREEN -->
<div id="win-screen">
  <div class="win-emoji">🎉</div>
  <h2>🏆 全部找到了！</h2>
  <p>太棒了！你发现了城市中所有 5 个太阳能装置！<br>太阳能让我们的城市更绿色、更美好！🌱</p>
  <button class="replay-btn" onclick="restart()">🔄 再玩一次！</button>
</div>

<script>
const ITEMS = [
  { id:"panel",  cx:76.5, cy:14.5, r:5.5, emoji:"🏠",
    title:"屋顶太阳能电池板",
    desc:"安装在办公楼屋顶的大型太阳能光伏板阵列，把阳光直接转化为电能，为整栋楼提供清洁电力。",
    fact:"一栋中型办公楼的屋顶太阳能系统，每年可发电约 10–15 万度，相当于节省数万林吉特电费！" },
  { id:"street", cx:29.5, cy:60,   r:5,   emoji:"💡",
    title:"太阳能路灯",
    desc:"灯杆旁边有一块倾斜的蓝色太阳能板，白天把阳光存入电池，天黑后自动为路灯供电。",
    fact:"太阳能路灯不需要挖沟铺电线，安装成本比传统路灯低 40%，特别适合新开发区域！" },
  { id:"bus",    cx:35,   cy:68.5, r:5,   emoji:"🚌",
    title:"太阳能公交候车亭",
    desc:"候车亭顶部铺有蓝色太阳能板，为亭内的 LED 显示屏、USB 充电口和夜间照明供电。",
    fact:"全马已有多个城市试验太阳能公交亭，乘客候车时可免费为手机充电！" },
  { id:"car",    cx:76.5, cy:72.5, r:8,   emoji:"🚗",
    title:"太阳能停车棚 + EV 充电",
    desc:"停车场顶部铺满两排太阳能板，产生的电力直接用于为电动汽车充电站供电，真正的绿色出行！",
    fact:"一个配备太阳能棚的大型停车场，每天可为超过 50 辆电动车提供充电电力！" },
  { id:"sign",   cx:12,   cy:25.5, r:6,   emoji:"📺",
    title:"太阳能 LED 广告牌",
    desc:"广告牌顶部有一条细长的太阳能板，为广告屏的 LED 灯光供电，全天候发光，零电费！",
    fact:"一块太阳能广告牌每年可减少约 2 吨二氧化碳排放，相当于种了 100 棵树的效果！" },
];

let found = new Set();
let score = 0;

function renderHotspots() {
  const c = document.getElementById('scene-container');
  c.querySelectorAll('.hotspot').forEach(h => h.remove());
  const rect = c.getBoundingClientRect();
  ITEMS.forEach(item => {
    const div = document.createElement('div');
    div.className = 'hotspot' + (found.has(item.id) ? ' found' : '');
    const px = item.cx / 100 * rect.width;
    const py = item.cy / 100 * rect.height;
    const pr = item.r  / 100 * rect.width;
    div.style.cssText = `left:${px-pr}px;top:${py-pr}px;width:${pr*2}px;height:${pr*2}px;`;
    div.dataset.id = item.id;
    if (!found.has(item.id)) div.addEventListener('click', () => click(item));
    c.appendChild(div);
  });
}

function click(item) {
  if (found.has(item.id)) return;
  found.add(item.id);
  score += 100;
  document.querySelector(`.hotspot[data-id="${item.id}"]`)?.classList.add('found');
  document.querySelector(`.found-chip[data-id="${item.id}"]`)?.classList.add('active');
  document.getElementById('score-num').textContent = score;
  document.getElementById('progress-text').textContent = `已找到 ${found.size} / 5`;
  document.getElementById('popup-emoji').textContent = item.emoji;
  document.getElementById('popup-title').textContent = item.title;
  document.getElementById('popup-desc').textContent = item.desc;
  document.getElementById('popup-fact').innerHTML = `💡 <strong>趣味知识：</strong>${item.fact}`;
  document.getElementById('popup-overlay').classList.add('show');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
  if (found.size === ITEMS.length) setTimeout(() => document.getElementById('win-screen').classList.add('show'), 350);
}

function restart() {
  found = new Set(); score = 0;
  document.getElementById('score-num').textContent = 0;
  document.getElementById('progress-text').textContent = '已找到 0 / 5';
  document.getElementById('win-screen').classList.remove('show');
  document.querySelectorAll('.found-chip').forEach(c => c.classList.remove('active'));
  renderHotspots();
}

// init chips
document.getElementById('found-list').innerHTML = ITEMS.map(it =>
  `<div class="found-chip" data-id="${it.id}">${it.emoji} ${it.label || it.title}</div>`
).join('');

// init hotspots after paint
requestAnimationFrame(() => setTimeout(renderHotspots, 120));
window.addEventListener('resize', renderHotspots);
</script>


</body></html>
